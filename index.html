<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Benchmark Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --ink:     #1a1a1a;
      --ink2:    #444;
      --muted:   #999;
      --border:  #e0e0e0;
      --border-strong: #000;
      --surface: #f5f5f5;
      --white:   #fff;
      --accent:  #000;
      --panel-w: 340px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      background: #fff; color: var(--ink);
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    #header {
      background: #000; color: #fff;
      padding: 0 28px; height: 48px;
      display: flex; align-items: center;
      flex-shrink: 0; z-index: 1000;
    }
    #header h1 {
      font-family: 'Open Sans', sans-serif;
      font-size: 12px; font-weight: 300;
      letter-spacing: 3px; text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── FILTER BAR ──────────────────────────────────────────── */
    #filter-bar {
      background: #fff;
      border-bottom: 1px solid #000;
      padding: 0 0 0 28px;
      height: 44px;
      display: flex; align-items: stretch; gap: 0;
      flex-shrink: 0; overflow-x: auto; z-index: 999;
    }
    #filter-bar::-webkit-scrollbar { height: 2px; }
    #filter-bar::-webkit-scrollbar-thumb { background: #000; }
    #filter-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      color: #aaa; white-space: nowrap;
      display: flex; align-items: center;
      margin-right: 16px; flex-shrink: 0;
    }
    .pill {
      display: inline-flex; align-items: center;
      padding: 0 18px; height: 100%;
      border: none; border-right: 1px solid #e0e0e0;
      background: transparent;
      cursor: pointer; font-size: 11px; font-weight: 400;
      letter-spacing: 0.5px; color: #666;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      font-family: 'Open Sans', sans-serif;
      border-radius: 0;
    }
    .pill:hover { background: #f5f5f5; color: #000; }
    .pill.active { background: #000; color: #fff; }
    #count-badge {
      margin-left: auto; white-space: nowrap;
      font-size: 10px; color: #aaa; flex-shrink: 0;
      letter-spacing: 1px; padding: 0 24px;
      display: flex; align-items: center;
      text-transform: uppercase;
    }

    /* ── MAP WRAPPER ─────────────────────────────────────────── */
    #map-wrap { flex: 1; display: flex; position: relative; overflow: hidden; }
    #map { flex: 1; }

    /* ── SIDE PANEL ──────────────────────────────────────────── */
    #panel {
      width: var(--panel-w);
      background: #fff;
      border-left: 1px solid #000;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      position: absolute; right: 0; top: 0; bottom: 0;
      z-index: 800;
    }
    #panel.open { transform: translateX(0); }
    #panel-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; cursor: pointer;
      color: #bbb; font-size: 16px; line-height: 1;
      font-family: 'Open Sans', sans-serif;
      transition: color 0.12s;
    }
    #panel-close:hover { color: #000; }
    #panel-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    #panel-city {
      font-family: 'Open Sans', sans-serif;
      font-size: 24px; font-weight: 300;
      letter-spacing: -0.5px; line-height: 1.2;
      margin-bottom: 6px; color: #000;
    }
    #panel-country {
      font-size: 10px; color: #999;
      text-transform: uppercase; letter-spacing: 2px;
    }
    #panel-body { padding: 0; overflow-y: auto; flex: 1; }

    /* List view */
    .study-card {
      padding: 18px 28px;
      border-bottom: 1px solid #e8e8e8;
      cursor: pointer; transition: background 0.1s;
    }
    .study-card:hover { background: #f9f9f9; }
    .study-card-name {
      font-size: 13px; font-weight: 600;
      color: #000; margin-bottom: 8px; line-height: 1.4;
    }
    .study-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .study-card-project {
      display: inline-block; padding: 2px 8px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px; color: #fff;
    }
    .study-card-arrow { margin-left: auto; color: #ccc; font-size: 18px; font-weight: 300; }

    /* Detail view */
    #detail-back {
      display: none; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      font-size: 10px; font-weight: 600; color: #999;
      text-transform: uppercase; letter-spacing: 1.5px;
      padding: 18px 28px 0; transition: color 0.12s;
    }
    #detail-back:hover { color: #000; }
    #detail-back.visible { display: flex; }
    #detail-body { padding: 24px 28px; }
    .p-row { margin-bottom: 24px; }
    .p-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      color: #aaa; margin-bottom: 7px;
    }
    .p-value { font-size: 13px; color: #000; line-height: 1.6; font-weight: 300; }
    .p-project-badge {
      display: inline-block; padding: 3px 10px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px; color: #fff;
    }
    .tag {
      display: inline-block;
      background: #fff; border: 1px solid #ddd;
      padding: 3px 10px; font-size: 11px;
      margin: 3px 3px 0 0; color: #555;
      letter-spacing: 0.3px;
    }
    .tag.clickable { cursor: pointer; transition: all 0.12s; }
    .tag.clickable:hover { background: #000; border-color: #000; color: #fff; }
    .tag.active-topic { background: #000; border-color: #000; color: #fff; font-weight: 600; }
    .tag.clickable::after { content: ' ↗'; font-size: 9px; opacity: 0.45; }
    .ppt-path {
      font-size: 11px; color: #777;
      background: #f8f8f8; border: 1px solid #e8e8e8;
      padding: 10px 12px; word-break: break-all;
      line-height: 1.6; font-family: 'Courier New', monospace;
    }

    /* ── ADD BUTTON ──────────────────────────────────────────── */
    #add-btn {
      position: absolute; bottom: 28px; right: 28px;
      z-index: 900; background: #000; color: #fff;
      border: none; padding: 13px 22px;
      font-family: 'Open Sans', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: background 0.15s; text-decoration: none;
    }
    #add-btn:hover { background: #333; }
    #add-btn span { font-size: 18px; font-weight: 300; line-height: 1; }

    /* ── LOADING ─────────────────────────────────────────────── */
    #loading {
      position: absolute; inset: 0; z-index: 2000;
      background: rgba(255,255,255,0.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      pointer-events: none;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 22px; height: 22px;
      border: 1.5px solid #ddd; border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg {
      font-size: 10px; color: #aaa;
      letter-spacing: 2px; text-transform: uppercase;
    }

    /* ── EMPTY STATE ─────────────────────────────────────────── */
    #empty-state {
      position: absolute; bottom: 88px; left: 50%;
      transform: translateX(-50%); z-index: 700;
      background: #fff; border: 1px solid #000;
      padding: 16px 28px; text-align: center;
      pointer-events: none; display: none;
    }
    #empty-state.visible { display: block; }
    #empty-state strong { display: block; font-size: 12px; font-weight: 600; color: #000; margin-bottom: 4px; letter-spacing: 0.5px; }
    #empty-state p { font-size: 11px; color: #999; }

    /* ── LEAFLET OVERRIDES ───────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 0;
      box-shadow: none;
      border: 1px solid #000;
    }
    .leaflet-popup-content { margin: 0; }
    .leaflet-popup-tip-container { display: none; }
    .mini-popup { padding: 14px 18px; min-width: 160px; }
    .mini-popup strong { font-size: 12px; font-weight: 600; display: block; letter-spacing: 0.3px; margin-bottom: 3px; }
    .mini-popup small { font-size: 10px; color: #999; display: block; }
    .mini-popup .click-hint {
      font-size: 10px; color: #000; margin-top: 8px; display: block;
      text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    }
    .leaflet-control-attribution { font-size: 9px !important; }
    .leaflet-control-zoom a {
      border-radius: 0 !important;
      border: 1px solid #000 !important;
      font-weight: 300 !important;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>Benchmark Map</h1>
</div>

<!-- FILTER BAR -->
<div id="filter-bar">
  <span id="filter-label">Topic</span>
  <button class="pill active" data-topic="ALL" onclick="activateTopicFilter('ALL', this)">All</button>
  <!-- project pills injected here -->
  <span id="count-badge">— case studies</span>
</div>

<!-- MAP + PANEL -->
<div id="map-wrap">

  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-msg">Loading case studies…</div>
  </div>

  <div id="empty-state">
    <strong>No case studies yet</strong>
    <p>Use the "+ Add Case Study" button to add your first one.</p>
  </div>

  <div id="map"></div>

  <!-- SIDE PANEL -->
  <div id="panel">
    <button id="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-header">
      <div id="panel-city">—</div>
      <div id="panel-country">—</div>
    </div>
    <!-- LIST VIEW: multiple studies in same city -->
    <div id="panel-body"></div>
    <!-- DETAIL VIEW: single study -->
    <button id="detail-back" onclick="backToList()">← Back to list</button>
    <div id="detail-body">
      <div class="p-row">
        <div class="p-label">Case Study Name</div>
        <div class="p-value" id="p-name">—</div>
      </div>
      <div class="p-row">
        <div class="p-label">Project</div>
        <div id="p-project">—</div>
      </div>
      <div class="p-row">
        <div class="p-label">Topics</div>
        <div id="p-topics">—</div>
      </div>
      <div class="p-row">
        <div class="p-label">PPT Location on Server</div>
        <div class="ppt-path" id="p-ppt">—</div>
      </div>
    </div>
  </div>

  <!-- ADD BUTTON -->
  <a id="add-btn" href="https://forms.gle/JSodQBTWFCRyPAQy5" target="_blank">
    <span>＋</span> Add Case Study
  </a>

</div><!-- end map-wrap -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION  — edit these two lines
// ═══════════════════════════════════════════════════════════
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSInLYcXsWJSrF00NPxKyMU7fibt7UQ9imBuwvVXxapcsuCSWxVf1Yjp-Lkfki1TeANX6lDmUPIC64x/pub?gid=1530269309&single=true&output=csv";
const FORM_URL      = "https://forms.gle/JSodQBTWFCRyPAQy5";
// ═══════════════════════════════════════════════════════════

document.getElementById('add-btn').href = FORM_URL;

// ── MAP SETUP ────────────────────────────────────────────────
// Initialise map immediately — basemap loads independently of data
const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Primary tile layer (CartoDB Voyager — modern, clean)
const primaryTiles = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  { attribution: '© <a href="https://www.openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>', maxZoom: 19 }
);
// Fallback tile layer (OpenStreetMap) in case CartoDB is blocked
const fallbackTiles = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© <a href="https://www.openstreetmap.org">OpenStreetMap</a> contributors', maxZoom: 19 }
);

primaryTiles.addTo(map);

// If the first tile errors, swap to OSM
let tilesFailed = 0;
primaryTiles.on('tileerror', () => {
  tilesFailed++;
  if (tilesFailed === 3) { // switch after 3 failures to avoid flapping
    map.removeLayer(primaryTiles);
    fallbackTiles.addTo(map);
  }
});

// Force Leaflet to recalculate size once layout is settled
setTimeout(() => map.invalidateSize(), 100);

// ── COLOUR PALETTE (project colours) ────────────────────────
const PALETTE = [
  '#e63946','#2a9d8f','#e9a800','#457b9d',
  '#f4631e','#6a4c93','#0077b6','#d62828',
  '#2dc653','#ff477e'
];
const PROJECT_COLORS = {};
function projectColor(name) {
  if (!PROJECT_COLORS[name]) {
    const i = Object.keys(PROJECT_COLORS).length % PALETTE.length;
    PROJECT_COLORS[name] = PALETTE[i];
  }
  return PROJECT_COLORS[name];
}

// Dot size scales with number of studies: 14px → up to 40px
function dotSize(count) {
  return Math.min(14 + (count - 1) * 7, 40);
}

// Build a circular marker icon with a count badge
// color: single project color, or accent for mixed projects
function makeClusterIcon(count, color) {
  const size = dotSize(count);
  const fontSize = size < 22 ? 10 : size < 30 ? 12 : 14;
  const label = count > 1 ? `<span style="
    position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;color:white;font-weight:600;
    font-size:${fontSize}px;font-family:'Open Sans',sans-serif;
    line-height:1;letter-spacing:-0.5px;
  ">${count}</span>` : '';
  return L.divIcon({
    className: '',
    html: `<div style="
      position:relative;
      width:${size}px;height:${size}px;border-radius:50%;
      background:${color};
      border:2.5px solid white;
      box-shadow:0 1px 6px rgba(0,0,0,0.35);
      cursor:pointer;
    ">${label}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

// ── GEOCODE CACHE (localStorage) ────────────────────────────
const GEO_CACHE_KEY = 'benchmark_geocache_v1';
function loadCache() {
  try { return JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function saveCache(cache) {
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(cache)); }
  catch {}
}
const geoCache = loadCache();

async function geocode(city, country) {
  const key = `${city}|${country}`.toLowerCase();
  if (geoCache[key]) return geoCache[key];
  const q = encodeURIComponent(`${city}, ${country}`);
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' }});
    const data = await res.json();
    if (data && data[0]) {
      const result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      geoCache[key] = result;
      saveCache(geoCache);
      return result;
    }
  } catch {}
  return null;
}

// Rate-limited sequential geocoding (Nominatim: max 1 req/sec)
async function geocodeAll(items) {
  const results = [];
  for (let i = 0; i < items.length; i++) {
    const { row } = items[i];
    const key = `${row['City']}|${row['Country']}`.toLowerCase();
    const cached = geoCache[key];
    if (cached) {
      results.push({ row, coords: cached });
    } else {
      document.getElementById('loading-msg').textContent =
        `Locating ${row['City']}… (${i+1}/${items.length})`;
      const coords = await geocode(row['City'], row['Country']);
      results.push({ row, coords });
      if (i < items.length - 1) await new Promise(r => setTimeout(r, 1100));
    }
  }
  return results;
}

// ── STATE ────────────────────────────────────────────────────
let allRows       = [];  // all geocoded {row, coords}
let cityMarkerData = []; // {marker, topicSet, studies, city, country}
let activeTopic   = 'ALL';
let lastListStudies = null;

// ── RENDER MARKERS ───────────────────────────────────────────
// Always renders all cities. Topic highlight dims non-matching ones.
function renderMarkers(rows) {
  cityMarkerData.forEach(({ marker }) => map.removeLayer(marker));
  cityMarkerData = [];

  // Group all rows by city|country
  const groups = {};
  rows.forEach(({ row, coords }) => {
    if (!coords) return;
    const key = `${row['City']}|${row['Country']}`.toLowerCase();
    if (!groups[key]) groups[key] = { coords, city: row['City'], country: row['Country'], studies: [] };
    groups[key].studies.push(row);
  });

  Object.values(groups).forEach(({ coords, city, country, studies }) => {
    const count = studies.length;

    // Collect all topics this city covers
    const topicSet = new Set();
    studies.forEach(s => {
      (s['Topics covered (comma-separated)'] || '').split(',')
        .map(t => t.trim()).filter(Boolean).forEach(t => topicSet.add(t));
    });

    // Color by project (single project = that color, mixed = accent)
    const uniqueProjects = [...new Set(studies.map(s => s['Associated project']).filter(Boolean))];
    const color = uniqueProjects.length === 1 ? projectColor(uniqueProjects[0]) : '#2b2b5e';

    const marker = L.marker([coords.lat, coords.lng], {
      icon: makeClusterIcon(count, color),
      zIndexOffset: count * 10
    });

    const preview = studies.slice(0, 3).map(s => s['Case study name']).join('<br>');
    const more    = count > 3 ? `<br><span style="color:var(--muted);font-size:11px">+ ${count-3} more…</span>` : '';
    marker.bindPopup(`
      <div class="mini-popup">
        <strong>${city}</strong>
        <small style="display:block;margin:4px 0 6px">${count} case stud${count===1?'y':'ies'}</small>
        ${preview}${more}
      </div>`, { closeButton: false, offset: [0, -4] });

    marker.on('mouseover', function() { this.openPopup(); });
    marker.on('mouseout',  function() { this.closePopup(); });
    marker.on('click', function() {
      this.closePopup();
      if (count === 1) openDetailPanel(studies[0], projectColor(studies[0]['Associated project']), false);
      else openListPanel(city, country, studies);
    });

    marker.addTo(map);
    cityMarkerData.push({ marker, topicSet, studies, city, country });
  });

  document.getElementById('count-badge').textContent =
    `${rows.length} case stud${rows.length===1?'y':'ies'}`;

  // Re-apply any active topic highlight
  applyTopicHighlight(activeTopic);
}

// Dim markers whose cities don't cover the active topic
function applyTopicHighlight(topic) {
  activeTopic = topic;
  cityMarkerData.forEach(({ marker, topicSet }) => {
    const matches = topic === 'ALL' || topicSet.has(topic);
    const el = marker.getElement();
    if (el) el.style.opacity = matches ? '1' : '0.15';
  });
}

// ── TOPIC FILTERS ─────────────────────────────────────────────
function buildTopicFilters(topics) {
  const bar   = document.getElementById('filter-bar');
  const badge = document.getElementById('count-badge');
  topics.sort().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.topic = t;
    btn.textContent = t;
    btn.onclick = () => activateTopicFilter(t, btn);
    bar.insertBefore(btn, badge);
  });
}

function activateTopicFilter(topic, btn) {
  // Toggle off if already active
  if (activeTopic === topic) {
    activeTopic = 'ALL';
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    document.querySelector('.pill[data-topic="ALL"]').classList.add('active');
    applyTopicHighlight('ALL');
    // Clear active-topic highlight on panel tags too
    document.querySelectorAll('.tag.active-topic').forEach(t => t.classList.remove('active-topic'));
    return;
  }
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyTopicHighlight(topic);
  // Sync active state on any visible panel topic tags
  document.querySelectorAll('.tag.clickable').forEach(t => {
    t.classList.toggle('active-topic', t.dataset.topic === topic);
  });
}

// ── PANEL: LIST MODE ─────────────────────────────────────────
function openListPanel(city, country, studies) {
  lastListStudies = { city, country, studies };
  document.getElementById('panel-city').textContent    = city;
  document.getElementById('panel-country').textContent = country;
  document.getElementById('detail-back').classList.remove('visible');

  const body = document.getElementById('panel-body');
  body.style.display = 'block';
  document.getElementById('detail-body').style.display = 'none';
  body.innerHTML = studies.map((s, i) => {
    const color  = projectColor(s['Associated project']);
    const topics = (s['Topics covered (comma-separated)'] || '').split(',').slice(0,2).map(t => t.trim()).filter(Boolean);
    const topicTags = topics.map(t =>
      `<span class="tag" style="font-size:10px;padding:2px 6px">${t}</span>`).join('');
    return `
      <div class="study-card" onclick="openDetailPanel(window._studies[${i}],'${color}',true)">
        <div class="study-card-name">${s['Case study name'] || '—'}</div>
        <div class="study-card-meta">
          <span class="study-card-project" style="background:${color}">${s['Associated project'] || '—'}</span>
          ${topicTags}
          <span class="study-card-arrow">›</span>
        </div>
      </div>`;
  }).join('');

  window._studies = studies;
  document.getElementById('panel').classList.add('open');
}

// ── PANEL: DETAIL MODE ───────────────────────────────────────
function openDetailPanel(data, color, showBack) {
  document.getElementById('panel-city').textContent    = data['City'] || '—';
  document.getElementById('panel-country').textContent = data['Country'] || '—';

  const backBtn = document.getElementById('detail-back');
  backBtn.classList.toggle('visible', !!showBack);

  document.getElementById('panel-body').style.display  = 'none';
  document.getElementById('detail-body').style.display = 'block';

  document.getElementById('p-name').textContent = data['Case study name'] || '—';
  document.getElementById('p-project').innerHTML =
    `<span class="p-project-badge" style="background:${color}">${data['Associated project'] || '—'}</span>`;

  const topics = (data['Topics covered (comma-separated)'] || '').split(',').map(t => t.trim()).filter(Boolean);
  document.getElementById('p-topics').innerHTML = topics.length
    ? topics.map(t => `
        <span class="tag clickable${activeTopic===t?' active-topic':''}"
              data-topic="${t}"
              onclick="activateTopicFilter('${t}', document.querySelector('.pill[data-topic=\\'${t}\\']'))"
              title="Highlight all case studies on this topic">${t}</span>`
      ).join('')
    : '—';

  document.getElementById('p-ppt').textContent = data['PPT path on server'] || '—';
  document.getElementById('panel').classList.add('open');
}

function backToList() {
  if (!lastListStudies) return;
  openListPanel(lastListStudies.city, lastListStudies.country, lastListStudies.studies);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  lastListStudies = null;
}

// ── LOAD DATA ────────────────────────────────────────────────
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function showEmpty() {
  document.getElementById('empty-state').classList.add('visible');
  document.getElementById('count-badge').textContent = '0 case studies';
}

async function loadData() {
  if (!SHEET_CSV_URL || SHEET_CSV_URL === 'YOUR_GOOGLE_SHEET_CSV_PUBLISH_URL') {
    hideLoading(); showEmpty(); return;
  }

  Papa.parse(SHEET_CSV_URL, {
    download: true, header: true, skipEmptyLines: true,
    complete: async function(results) {
      const rows = results.data.filter(r => r['City'] && r['Country']);
      if (rows.length === 0) { hideLoading(); showEmpty(); return; }

      // Collect all unique topics across every case study
      const topicSet = new Set();
      rows.forEach(r => {
        (r['Topics covered (comma-separated)'] || '').split(',')
          .map(t => t.trim()).filter(Boolean).forEach(t => topicSet.add(t));
      });

      // Assign project colours (still used for dot coloring)
      const projects = [...new Set(rows.map(r => r['Associated project']).filter(Boolean))];
      projects.forEach(p => projectColor(p));

      buildTopicFilters([...topicSet]);

      // Geocode
      const geocoded = await geocodeAll(rows.map(row => ({ row })));
      allRows = geocoded.filter(g => g.coords);

      renderMarkers(allRows);
      hideLoading();
      if (allRows.length === 0) showEmpty();
    },
    error: function(err) {
      console.error('PapaParse error', err);
      document.getElementById('loading-msg').textContent =
        '⚠ Could not load data. Check your Sheet URL is published as CSV.';
      setTimeout(hideLoading, 3000);
    }
  });
}

loadData();
</script>
